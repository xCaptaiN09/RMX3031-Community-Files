<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RMX3031 Community Files</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;600;800&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #ffffff0f;
    --accent: #ff6b35;
    --accent2: #ff9a1f;
    --text: #f0f0f5;
    --muted: #6b6b80;
    --green: #22c55e;
    --blue: #3b82f6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid handled by cursor-grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(#ffffff06 1px, transparent 1px),
      linear-gradient(90deg, #ffffff06 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .cursor-glow {
    position: fixed;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, #ff6b3518 0%, #ff6b350a 30%, transparent 70%);
    opacity: 0;
  }

  .cursor-grid {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    --mouse-x: 50%;
    --mouse-y: 50%;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    -webkit-mask-image: radial-gradient(ellipse 600px 600px at var(--mouse-x) var(--mouse-y),
      rgba(0,0,0,0.15) 0%,
      rgba(0,0,0,0.08) 40%,
      rgba(0,0,0,1) 70%);
    mask-image: radial-gradient(ellipse 600px 600px at var(--mouse-x) var(--mouse-y),
      rgba(0,0,0,0.15) 0%,
      rgba(0,0,0,0.08) 40%,
      rgba(0,0,0,1) 70%);
  }

  .cursor-grid-bright {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    --mouse-x: 50%;
    --mouse-y: 50%;
    background-image:
      linear-gradient(#ff6b3540 1px, transparent 1px),
      linear-gradient(90deg, #ff6b3540 1px, transparent 1px);
    background-size: 40px 40px;
    -webkit-mask-image: radial-gradient(ellipse 200px 200px at var(--mouse-x) var(--mouse-y),
      black 0%,
      transparent 100%);
    mask-image: radial-gradient(ellipse 200px 200px at var(--mouse-x) var(--mouse-y),
      black 0%,
      transparent 100%);
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    padding: 60px 0 40px;
    border-bottom: 1px solid var(--border);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #ff6b3515;
    border: 1px solid #ff6b3530;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }

  .badge::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  h1 {
    font-size: clamp(30px, 7vw, 72px);
    font-weight: 400;
    font-family: 'Archivo Black', sans-serif;
    font-weight: 400;
    line-height: 1.0;
    letter-spacing: -1px;
    text-transform: uppercase;
  }

  h1 span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    margin-top: 12px;
    color: var(--muted);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }

  .meta-row {
    display: flex;
    gap: 20px;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
  }

  .meta-item strong {
    color: var(--text);
  }

  /* Tabs */
  .tabs-wrapper {
    position: relative;
    margin: 40px 0 24px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .tab-arrow {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.2s;
    opacity: 0;
    pointer-events: none;
  }

  .tab-arrow.visible {
    opacity: 1;
    pointer-events: all;
  }

  .tab-arrow:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .tabs {
    display: flex;
    gap: 4px;
    flex: 1;
    background: var(--surface);
    padding: 4px;
    border-radius: 10px;
    border: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
    scroll-behavior: smooth;
  }

  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    padding: 10px 12px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 7px;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .tab:hover { color: var(--text); background: var(--surface2); }

  .tab.active {
    background: var(--accent);
    color: white;
  }

  .tab .count {
    background: #ffffff25;
    border-radius: 20px;
    padding: 1px 7px;
    font-size: 11px;
  }

  /* Content */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 12px;
    transition: border-color 0.2s, transform 0.2s;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card:hover {
    border-color: #ff6b3340;
    transform: translateY(-1px);
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    flex-wrap: wrap;
  }

  .card-title {
    font-size: 16px;
    font-weight: 600;
  }

  .card-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .tag.android { border-color: #22c55e30; color: var(--green); background: #22c55e10; }
  .tag.date { border-color: #3b82f630; color: var(--blue); background: #3b82f610; }
  .tag.size { border-color: var(--border); }

  .changelog {
    margin-top: 14px;
    padding: 12px;
    background: var(--surface2);
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    display: none;
    border-left: 2px solid var(--accent);
  }

  .changelog.open { display: block; }

  .card-actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 7px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    border: none;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
  }

  .btn-primary:hover { background: #ff5520; }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    border: 1px dashed var(--border);
    border-radius: 12px;
  }

  .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }

  /* Footer */
  footer {
    margin-top: 60px;
    padding: 30px 0;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: gap;
    gap: 12px;
  }

  footer a {
    color: var(--accent);
    text-decoration: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }

  .footer-muted {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 40px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="cursor-grid" id="cursorGrid"></div>
<div class="cursor-grid-bright" id="cursorGridBright"></div>
<div class="cursor-glow" id="cursorGlow"></div>

<div class="container">
  <header>
    <div class="badge">COMMUNITY FILES</div>
    <h1>Realme X7 Max<br><span>RMX3031</span></h1>
    <p class="subtitle">Custom ROMs · Kernels · OTA · Recovery</p>
    <div class="meta-row" id="meta-row">
      <div class="meta-item">Maintained by <strong id="maintainer">—</strong></div>
      <div class="meta-item">Hosted on <strong>Archive.org</strong></div>
    </div>
  </header>

  <div class="tabs-wrapper">
    <button class="tab-arrow" id="tabLeft" onclick="scrollTabs(-1)">&#8592;</button>
    <div class="tabs" id="tabsContainer">
      <button class="tab active" onclick="switchTab('roms')">ROMs <span class="count" id="count-roms">0</span></button>
      <button class="tab" onclick="switchTab('kernels')">Kernels <span class="count" id="count-kernels">0</span></button>
      <button class="tab" onclick="switchTab('modules')">Modules <span class="count" id="count-modules">0</span></button>
      <button class="tab" onclick="switchTab('ota')">X7 MAX <span class="count" id="count-ota">0</span></button>
      <button class="tab" onclick="switchTab('ota_cn')">GT Neo <span class="count" id="count-ota_cn">0</span></button>
      <button class="tab" onclick="switchTab('ota_cnf')">GT Neo Flash <span class="count" id="count-ota_cnf">0</span></button>
      <button class="tab" onclick="switchTab('firmware')">Firmware <span class="count" id="count-firmware">0</span></button>
      <button class="tab" onclick="switchTab('sptool')">SP Tool FW <span class="count" id="count-sptool">0</span></button>
      <button class="tab" onclick="switchTab('recovery')">Recovery <span class="count" id="count-recovery">0</span></button>
      <button class="tab" onclick="switchTab('other')">Other <span class="count" id="count-other">0</span></button>
    </div>
    <button class="tab-arrow" id="tabRight" onclick="scrollTabs(1)">&#8594;</button>
  </div>

  <div id="loading" class="loading">Loading files...</div>

  <div id="tab-roms" class="tab-content active"></div>
  <div id="tab-kernels" class="tab-content"></div>
  <div id="tab-modules" class="tab-content"></div>
  <div id="tab-ota" class="tab-content"></div>
  <div id="tab-ota_cn" class="tab-content"></div>
  <div id="tab-ota_cnf" class="tab-content"></div>
  <div id="tab-firmware" class="tab-content"></div>
  <div id="tab-sptool" class="tab-content"></div>
  <div id="tab-recovery" class="tab-content"></div>
  <div id="tab-other" class="tab-content"></div>

  <footer>
    <a href="https://github.com/xCaptaiN09/RMX3031-Community-Files" target="_blank">GitHub →</a>
    <span class="footer-muted">Files hosted on Internet Archive</span>
  </footer>
</div>

<script>
  const JSON_URL = 'index.json';

  let data = null;

  async function loadData() {
    try {
      const res = await fetch(JSON_URL);
      data = await res.json();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('maintainer').textContent = data.maintainer || '—';
      renderAll();
    } catch(e) {
      document.getElementById('loading').textContent = 'Failed to load files.';
    }
  }

  function renderAll() {
    ['roms', 'kernels', 'modules', 'ota', 'ota_cn', 'ota_cnf', 'firmware', 'sptool', 'recovery', 'other'].forEach(cat => {
      const items = data[cat] || [];
      document.getElementById(`count-${cat}`).textContent = items.length;
      const el = document.getElementById(`tab-${cat}`);
      if (items.length === 0) {
        el.innerHTML = `<div class="empty"><div class="empty-icon">📭</div>No files yet.</div>`;
      } else {
        el.innerHTML = items.map((item, i) => renderCard(item, i, cat)).join('');
      }
    });
  }

  function renderCard(item, i, cat) {
    const delay = i * 60;
    return `
      <div class="card" style="animation-delay:${delay}ms">
        <div class="card-header">
          <div>
            <div class="card-title">${item.name}</div>
            <div class="card-tags">
              ${item.android ? `<span class="tag android">Android ${item.android}</span>` : ''}
              ${item.version ? `<span class="tag">v${item.version}</span>` : ''}
              ${item.date ? `<span class="tag date">${item.date}</span>` : ''}
              ${item.size ? `<span class="tag size">${item.size}</span>` : ''}
            </div>
          </div>
        </div>
        ${item.changelog ? `
          <div class="changelog" id="cl-${cat}-${i}">${item.changelog}</div>
        ` : ''}
        <div class="card-actions">
          <a class="btn btn-primary" href="${item.url}" target="_blank">↓ Download</a>
          ${item.changelog ? `<button class="btn btn-secondary" onclick="toggleChangelog('${cat}','${i}')">Changelog</button>` : ''}
        </div>
      </div>
    `;
  }

  function toggleChangelog(cat, i) {
    const el = document.getElementById(`cl-${cat}-${i}`);
    el.classList.toggle('open');
  }

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    event.target.closest('.tab').classList.add('active');
    document.getElementById(`tab-${name}`).classList.add('active');
  }

  // Tab arrow scroll
  const tabsContainer = document.getElementById('tabsContainer');
  const tabLeft = document.getElementById('tabLeft');
  const tabRight = document.getElementById('tabRight');

  function updateArrows() {
    const overflowing = tabsContainer.scrollWidth > tabsContainer.clientWidth;
    tabLeft.classList.toggle('visible', overflowing && tabsContainer.scrollLeft > 0);
    tabRight.classList.toggle('visible', overflowing && tabsContainer.scrollLeft < tabsContainer.scrollWidth - tabsContainer.clientWidth - 1);
  }

  function scrollTabs(dir) {
    tabsContainer.scrollLeft += dir * 150;
    setTimeout(updateArrows, 300);
  }

  tabsContainer.addEventListener('scroll', updateArrows);
  window.addEventListener('resize', updateArrows);
  setTimeout(updateArrows, 100);

  // Cursor grid illumination with spring lag
  const cursorGrid = document.getElementById('cursorGrid');
  const cursorGridBright = document.getElementById('cursorGridBright');
  const cursorGlow = document.getElementById('cursorGlow');

  let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
  let glowX = mouseX, glowY = mouseY;
  let gridX = mouseX, gridY = mouseY;
  let isVisible = false;

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    if (!isVisible) {
      glowX = mouseX; glowY = mouseY;
      gridX = mouseX; gridY = mouseY;
      isVisible = true;
    }
    cursorGlow.style.opacity = '1';
    cursorGridBright.style.opacity = '1';
  });

  document.addEventListener('mouseleave', () => {
    isVisible = false;
    cursorGlow.style.opacity = '0';
    cursorGridBright.style.opacity = '0';
  });

  function animate() {
    // Glow follows with tight spring
    glowX += (mouseX - glowX) * 0.08;
    glowY += (mouseY - glowY) * 0.08;

    // Grid highlight follows with looser spring (more lag)
    gridX += (mouseX - gridX) * 0.04;
    gridY += (mouseY - gridY) * 0.04;

    cursorGlow.style.left = glowX + 'px';
    cursorGlow.style.top = glowY + 'px';

    cursorGrid.style.setProperty('--mouse-x', gridX + 'px');
    cursorGrid.style.setProperty('--mouse-y', gridY + 'px');
    cursorGridBright.style.setProperty('--mouse-x', glowX + 'px');
    cursorGridBright.style.setProperty('--mouse-y', glowY + 'px');

    requestAnimationFrame(animate);
  }

  animate();
  loadData();
</script>
</body>
</html>
